{% extends 'base.html' %} {% block content %}
<h1>Login</h1>
<form method="POST">
  <label>User Type:</label>
  <select name="user_type">
    <option value="customer">Customer</option>
    <option value="staff">Airline Staff</option></select
  ><br /><br />

  <label>Email or Username:</label>
  <input type="text" name="identifier" required /><br /><br />

  <label>Password:</label>
  <input type="password" name="password" required /><br /><br />

  <button type="submit">Login</button>
</form>

<p>Customer test login: cj@example.com / test123</p>
<p>Staff test login: staff1 / admin123</p>
<p><a href="{{ url_for('reset_db') }}">Reset sample database</a></p>
{% endblock %}
