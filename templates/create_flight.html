{% extends 'base.html' %} {% block content %}
<section class="hero">
  <p class="eyebrow">Create Flight</p>
  <h1>Add a new route to the schedule</h1>
  <p>Enter route details, timing, pricing, and aircraft assignment.</p>
</section>

<section class="panel">
  <form method="POST">
    <div class="form-grid">
      <div class="field">
        <label for="source_city">Source City</label>
        <input id="source_city" type="text" name="source_city" placeholder="New York" />
      </div>

      <div class="field">
        <label for="destination_city">Destination City</label>
        <input id="destination_city" type="text" name="destination_city" placeholder="Los Angeles" />
      </div>

      <div class="field">
        <label for="source">Source Airport</label>
        <input id="source" type="text" name="source" placeholder="JFK" required />
      </div>

      <div class="field">
        <label for="destination">Destination Airport</label>
        <input
          id="destination"
          type="text"
          name="destination"
          placeholder="LAX"
          required
        />
      </div>

      <div class="field">
        <label for="departure_time">Departure Time</label>
        <input id="departure_time" type="datetime-local" name="departure_time" required />
      </div>

      <div class="field">
        <label for="arrival_time">Arrival Time</label>
        <input id="arrival_time" type="datetime-local" name="arrival_time" required />
      </div>

      <div class="field">
        <label for="price">Price</label>
        <input id="price" type="number" step="0.01" name="price" placeholder="199.00" required />
      </div>

      <div class="field">
        <label for="airplane_id">Airplane</label>
        <select id="airplane_id" name="airplane_id" required>
          {% for plane in airplanes %}
          <option value="{{ plane['airplane_id'] }}">{{ plane['airplane_id'] }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="inline-actions">
      <button type="submit">Create Flight</button>
      <a class="button-secondary" href="{{ url_for('staff_home') }}">Back</a>
    </div>
  </form>
</section>
{% endblock %}
