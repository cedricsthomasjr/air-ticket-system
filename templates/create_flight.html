{% extends 'base.html' %} {% block content %}
<h1>Create New Flight</h1>
<form method="POST">
  <label>Source Airport:</label>
  <input type="text" name="source" required /><br /><br />

  <label>Destination Airport:</label>
  <input type="text" name="destination" required /><br /><br />

  <label>Departure Time:</label>
  <input type="datetime-local" name="departure_time" required /><br /><br />

  <label>Arrival Time:</label>
  <input type="datetime-local" name="arrival_time" required /><br /><br />

  <label>Price:</label>
  <input type="number" step="0.01" name="price" required /><br /><br />

  <label>Airplane:</label>
  <select name="airplane_id" required>
    {% for plane in airplanes %}
    <option value="{{ plane['airplane_id'] }}">
      {{ plane['airplane_id'] }}
    </option>
    {% endfor %}</select
  ><br /><br />

  <button type="submit">Create Flight</button>
</form>

<br />
<a href="{{ url_for('staff_home') }}">Back</a>
{% endblock %}
