{% extends 'base.html' %} {% block content %}
<section class="hero">
  <p class="eyebrow">Create Flight</p>
  <h1>Add a new route to the schedule</h1>
  <p>Enter route details, timing, pricing, and aircraft assignment.</p>
</section>

<section class="panel">
  <form method="POST">
    <div class="form-grid">
      <div class="field">
        <label for="flight_number">Flight Number</label>
        <input id="flight_number" type="text" name="flight_number" placeholder="JB450" required />
      </div>

      <div class="field">
        <label for="departure_airport_code">Departure Airport Code</label>
        <input id="departure_airport_code" type="text" name="departure_airport_code" maxlength="3" placeholder="JFK" required />
      </div>

      <div class="field">
        <label for="arrival_airport_code">Arrival Airport Code</label>
        <input
          id="arrival_airport_code"
          type="text"
          name="arrival_airport_code"
          maxlength="3"
          placeholder="PVG"
          required
        />
      </div>

      <div class="field">
        <label for="departure_time">Departure Time</label>
        <input id="departure_time" type="datetime-local" name="departure_time" required />
      </div>

      <div class="field">
        <label for="arrival_time">Arrival Time</label>
        <input id="arrival_time" type="datetime-local" name="arrival_time" required />
      </div>

      <div class="field">
        <label for="price">Price</label>
        <input id="price" type="number" step="0.01" name="price" placeholder="199.00" required />
      </div>

      <div class="field">
        <label for="airplane_id">Airplane</label>
        <select id="airplane_id" name="airplane_id" required>
          {% for plane in airplanes %}
          <option value="{{ plane['airplane_id'] }}">{{ plane['airplane_id'] }} - {{ plane['manufacturer'] }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="inline-actions">
      <button type="submit">Create Flight</button>
      <a class="button-secondary" href="{{ url_for('staff_home') }}">Back</a>
    </div>
  </form>
</section>
{% endblock %}
